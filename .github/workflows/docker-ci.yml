name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set image tag
        run: echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV

      # -------------------------
      # Login to DockerHub
      # -------------------------
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # -------------------------
      # Build Backend
      # -------------------------
      - name: Build Backend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/ai-entertainment-backend:${{ env.IMAGE_TAG }} ./backend

      - name: Push Backend
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/ai-entertainment-backend:${{ env.IMAGE_TAG }}

      # -------------------------
      # Build Frontend
      # -------------------------
      - name: Build Frontend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/ai-entertainment-frontend:${{ env.IMAGE_TAG }} ./frontend

      - name: Push Frontend
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/ai-entertainment-frontend:${{ env.IMAGE_TAG }}

  deploy:
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Set image tag
        run: echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV

      # -------------------------
      # Update backend task definition
      # -------------------------
      - name: Register new backend task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition backend-task \
            --query taskDefinition > backend-task.json

          jq '.containerDefinitions[0].image = "${{ secrets.DOCKER_USERNAME }}/ai-entertainment-backend:${{ env.IMAGE_TAG }}"' backend-task.json > new-backend-task.json

          aws ecs register-task-definition \
            --cli-input-json file://new-backend-task.json

      - name: Update backend service
        run: |
          aws ecs update-service \
            --cluster ai-entertainment-cluster \
            --service backend-service \
            --force-new-deployment

      # -------------------------
      # Update frontend task definition
      # -------------------------
      - name: Register new frontend task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition frontend-task \
            --query taskDefinition > frontend-task.json

          jq '.containerDefinitions[0].image = "${{ secrets.DOCKER_USERNAME }}/ai-entertainment-frontend:${{ env.IMAGE_TAG }}"' frontend-task.json > new-frontend-task.json

          aws ecs register-task-definition \
            --cli-input-json file://new-frontend-task.json

      - name: Update frontend service
        run: |
          aws ecs update-service \
            --cluster ai-entertainment-cluster \
            --service frontend-service \
            --force-new-deployment
