name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  docker:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4


      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}


      - name: Build Backend
        run: |
          docker build -t mrunalikamerikar/ai-entertainment-backend:latest ./backend
          docker push mrunalikamerikar/ai-entertainment-backend:latest


      - name: Build Frontend
        run: |
          docker build -t mrunalikamerikar/ai-entertainment-frontend:latest ./frontend
          docker push mrunalikamerikar/ai-entertainment-frontend:latest
